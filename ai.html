<script>
// ─────────────────────────────────────────────
// AMMO AI CHAT — ai.html
// Backend: /api/chat (Gemini via Vercel serverless)
// ─────────────────────────────────────────────

const AMMO_AVATAR = "https://i.ibb.co.com/Jjj7tx4j/ammo-ai.webp";

const SUGGESTIONS = [
    { label: "Apa itu AMOGENZ?",        prompt: "Apa itu AMOGENZ?" },
    { label: "Produk AMOGENZ",          prompt: "Produk apa saja yang dimiliki AMOGENZ?" },
    { label: "Sejarah AMOGENZ",         prompt: "Bagaimana sejarah berdirinya AMOGENZ?" },
    { label: "aset logo AMOGENZ",         prompt: "Apa saja desain dan aset yang ada di AMOGENZ?" },
];

const viewport = document.getElementById('chatViewport');
const inputEl  = document.getElementById('userInput');
const sendBtn  = document.getElementById('sendBtn');
const clearBtn = document.getElementById('clearChatBtn');

// Conversation memory — keeps multi-turn context
let convHistory = [];
let chatStarted = false;

// ─── Welcome screen ───────────────────────────
function buildWelcome() {
    const div = document.createElement('div');
    div.id = 'chatWelcome';
    div.className = 'chat-welcome';
    div.innerHTML = `
        <img src="${AMMO_AVATAR}" alt="Ammo" class="chat-welcome-avatar">
        <h3 class="chat-welcome-title">Hai, saya Ammo!</h3>
        <p class="chat-welcome-desc">AI dari AMOGENZ yang sudah dilatih dengan database internal dan data internet. Tanyakan apa saja tentang AMOGENZ, atau hal lainnya.</p>
        <div class="chat-suggestions" id="chipContainer"></div>
        <p class="chat-disclaimer">⚠ AI dapat membuat kesalahan. Selalu verifikasi informasi penting.</p>
    `;
    // Bind each chip inside the closure so prompt is captured correctly
    const chipContainer = div.querySelector('#chipContainer');
    SUGGESTIONS.forEach(({ label, prompt }) => {
        const btn = document.createElement('button');
        btn.className = 'suggestion-btn';
        btn.textContent = label;
        btn.addEventListener('click', function () { sendMessage(prompt); });
        chipContainer.appendChild(btn);
    });
    return div;
}

function showWelcome() {
    viewport.innerHTML = '';
    chatStarted = false;
    viewport.appendChild(buildWelcome());
}

showWelcome(); // Initial state

// ─── Utilities ────────────────────────────────
function scrollBottom() {
    viewport.scrollTop = viewport.scrollHeight;
}

function dismissWelcome() {
    if (!chatStarted) {
        const w = document.getElementById('chatWelcome');
        if (w) { w.style.opacity = '0'; w.style.transition = 'opacity 0.2s'; setTimeout(() => w.remove(), 200); }
        chatStarted = true;
    }
}

function appendMsg(role, html) {
    dismissWelcome();
    const wrap = document.createElement('div');
    wrap.className = `message ${role === 'user' ? 'user-msg' : 'ai-msg'}`;
    if (role === 'ai') {
        wrap.innerHTML = `<img src="${AMMO_AVATAR}" class="msg-avatar-img" alt="Ammo"><div class="msg-bubble">${html}</div>`;
    } else {
        wrap.innerHTML = `<div class="msg-bubble">${html}</div><div class="msg-avatar-u">U</div>`;
    }
    viewport.appendChild(wrap);
    scrollBottom();
}

function appendLoading() {
    dismissWelcome();
    const wrap = document.createElement('div');
    wrap.className = 'message ai-msg';
    wrap.id = 'loadingMsg';
    wrap.innerHTML = `
        <img src="${AMMO_AVATAR}" class="msg-avatar-img" alt="Ammo">
        <div class="msg-bubble" style="opacity:0.5;font-style:italic;display:flex;align-items:center;gap:8px;">
            Mengetik
            <span style="display:inline-flex;gap:3px;align-items:center;">
                <span style="animation:blink .9s infinite 0s;display:inline-block;width:4px;height:4px;border-radius:50%;background:#888;"></span>
                <span style="animation:blink .9s infinite .22s;display:inline-block;width:4px;height:4px;border-radius:50%;background:#888;"></span>
                <span style="animation:blink .9s infinite .44s;display:inline-block;width:4px;height:4px;border-radius:50%;background:#888;"></span>
            </span>
        </div>`;
    viewport.appendChild(wrap);
    scrollBottom();
}

function removeLoading() {
    const el = document.getElementById('loadingMsg');
    if (el) el.remove();
}

function setInputState(disabled) {
    inputEl.disabled = disabled;
    sendBtn.disabled = disabled;
    if (!disabled) inputEl.focus();
}

// ─── Format Gemini markdown to HTML (VERSI UPDATE) ───────────
function formatResponse(text) {
    let html = text;

    // 1. Tangani Markdown Link: [Judul](https://url.com)
    // Ini akan mengubah [Amogenz](https://amogenz.xyz) menjadi link yang bersih
    html = html.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, (match, label, url) => {
        return `<a href="${url}" target="_blank" rel="noopener noreferrer">${label}</a>`;
    });

    // 2. Tangani Raw Link: https://url.com (yang tidak terbungkus Markdown)
    // Gunakan lookbehind agar tidak memproses ulang link yang sudah jadi tag <a> di tahap 1
    const rawUrlRegex = /(?<!href=")(?<!">)(https?:\/\/[^\s<]+[^.,\s<>{}!\[\]\x22\x27\x60])/g;
    html = html.replace(rawUrlRegex, (url) => {
        return `<a href="${url}" target="_blank" rel="noopener noreferrer">${url}</a>`;
    });

    // 3. Tangani Format Bold (**)
    html = html.replace(/\*\*(.*?)\*\*/g, '<strong style="color:#b4ffb4">$1</strong>');

    // 4. Tangani Format Italic (*)
    html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');

    // 5. Tangani Baris Baru
    html = html.replace(/\n\n/g, '</p><p style="margin-top:8px">');
    html = html.replace(/\n/g, '<br>');

    return html;
}

// ─── Core send function ───────────────────────
async function sendMessage(promptText) {
    const text = (promptText !== undefined ? promptText : inputEl.value).trim();
    if (!text) return;

    inputEl.value = '';
    appendMsg('user', text);
    setInputState(true);
    appendLoading();

    try {
        const res = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: text, history: convHistory })
        });

        const data = await res.json();
        removeLoading();

        if (!res.ok) throw new Error(data.error || `Server error ${res.status}`);

        // Parse Gemini response
        let displayHTML  = "Maaf, saya tidak bisa menjawab itu.";
        let rawForMemory = "";

        const candidate = data.candidates?.[0];
        if (candidate?.content?.parts?.[0]?.text) {
            rawForMemory = candidate.content.parts[0].text;
            displayHTML  = formatResponse(rawForMemory);

            // Show grounding badge if web search was used
            if (candidate.groundingMetadata?.searchEntryPoint) {
                displayHTML += `<span style="display:block;margin-top:8px;font-size:0.68rem;opacity:0.4;">🔍 Dari Google Search</span>`;
            }
        }

        appendMsg('ai', displayHTML);

        // Save turn to conversation memory
        convHistory.push({ role: "user",  parts: [{ text }] });
        convHistory.push({ role: "model", parts: [{ text: rawForMemory }] });

        // Keep history bounded (last 20 turns = 10 exchanges)
        if (convHistory.length > 20) convHistory = convHistory.slice(-20);

    } catch (err) {
        removeLoading();
        appendMsg('ai', `⚠️ <em>${err.message}</em>`);
    } finally {
        setInputState(false);
    }
}

// ─── Event listeners ──────────────────────────
sendBtn.addEventListener('click', function () { sendMessage(); });
inputEl.addEventListener('keypress', function (e) { if (e.key === 'Enter' && !e.shiftKey) sendMessage(); });

clearBtn.addEventListener('click', function () {
    convHistory = [];
    showWelcome();
});

// ─── Auto-trigger dari Halaman Utama (index.html) ───────────
window.addEventListener('DOMContentLoaded', () => {
    // Membaca parameter dari URL (misal: ?q=Halo%20Ammo)
    const urlParams = new URLSearchParams(window.location.search);
    const initialQuery = urlParams.get('q');

    if (initialQuery) {
        // Bersihkan URL agar jika di-refresh, AI tidak membalas ulang pertanyaan yang sama
        window.history.replaceState({}, document.title, window.location.pathname);
        
        // Isi input dan jalankan fungsi kirim
        inputEl.value = initialQuery;
        sendMessage();
    }
});

</script>
